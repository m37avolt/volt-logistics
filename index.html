<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>VOLT Logistics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        input, select, button {
            margin-top: 10px;
            display: block;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .button {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🛍 VOLT Logistics</h1>
    <button class="button" onclick="toggleSection('create-order')">📝 Создать заказ</button>

    <!-- Форма создания заказа -->
    <div id="create-order" class="section active">
        <label>Страна:</label>
        <select id="country" onchange="handleCountryChange()">
            <option value="" disabled selected>Выберите страну</option>
            <option value="china">🇨🇳 Китай</option>
            <option value="japan">🇯🇵 Япония</option>
        </select>

        <div id="marketplace-section" style="display:none;">
            <label>Маркетплейс:</label>
            <select id="marketplace">
                <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN</option>
                <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
            </select>
        </div>

        <label>ФИО:</label>
        <input type="text" id="full-name" placeholder="Пример: Иван Иванов">

        <label>Telegram @:</label>
        <input type="text" id="telegram-username" placeholder="@ivanov или +79001234567">

        <br><h3>Добавьте товар:</h3>
        <div id="items-container"></div>
        <button type="button" onclick="addItem()">➕ Добавить товар</button>

        <button onclick="submitOrder()">✅ Отправить заказ</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;

        function toggleSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove("active"));
            document.getElementById(sectionId).classList.add("active");
        }

        function handleCountryChange() {
            const country = document.getElementById("country").value;
            const marketplaceSection = document.getElementById("marketplace-section");
            marketplaceSection.style.display = country === "china" ? "block" : "none";
            document.getElementById("items-container").innerHTML = "";
            addItem();
        }

        function addItem() {
            const container = document.getElementById("items-container");
            const rowCount = container.childElementCount + 1;

            const newItem = document.createElement("div");
            newItem.className = "item-row";
            newItem.innerHTML = `
                <hr>
                <h4>Товар #${rowCount}</h4>
                <label>Фото:</label>
                <input type="file" class="item-photo" accept="image/*" multiple onchange="previewPhotos(this)">
                <div class="photo-preview"></div>

                <label>ID / Ссылка:</label>
                <input type="text" id="item-link-${rowCount}" placeholder="https://taobao.com/item123">

                <label>Цвет:</label>
                <input type="text" id="item-color-${rowCount}" placeholder="Черный / White">

                <label>Размер:</label>
                <input type="text" id="item-size-${rowCount}" placeholder="M / 42 / EU40">

                <label>Цена за единицу:</label>
                <input type="number" id="item-price-${rowCount}" step="any" placeholder="¥ 800">

                <label>Количество:</label>
                <input type="number" id="item-quantity-${rowCount}" min="1" value="1">

                <label>Комментарий:</label>
                <input type="text" id="item-comment-${rowCount}" placeholder="Упаковать аккуратно">

                <button type="button" onclick="removeItem(this)">🗑 Удалить товар</button>
            `;
            container.appendChild(newItem);
        }

        function removeItem(button) {
            button.parentElement.remove();
        }

        function previewPhotos(input) {
            const preview = input.nextElementSibling;
            preview.innerHTML = "";

            Array.from(input.files).slice(0, 5).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.style.width = "60px";
                    img.style.height = "60px";
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function submitOrder() {
            const full_name = document.getElementById("full-name").value.trim();
            const telegram_username = document.getElementById("telegram-username").value.trim();
            const country = document.getElementById("country").value;
            const marketplace = document.getElementById("marketplace").value;

            const itemsContainer = document.getElementById("items-container");
            const items = Array.from(itemsContainer.children).map((itemRow, idx) => {
                const photoInput = itemRow.querySelector(".item-photo");
                const linkOrIdInput = itemRow.querySelector(`#item-link-${idx + 1}`);
                const priceInput = itemRow.querySelector(`#item-price-${idx + 1}`);
                const colorInput = itemRow.querySelector(`#item-color-${idx + 1}`);
                const sizeInput = itemRow.querySelector(`#item-size-${idx + 1}`);
                const quantityInput = itemRow.querySelector(`#item-quantity-${idx + 1}`);
                const commentInput = itemRow.querySelector(`#item-comment-${idx + 1}`);

                return {
                    photos: [...Array.from(photoInput?.files || [])].map(f => f.name),
                    link_or_id: linkOrIdInput?.value || '',
                    price: parseFloat(priceInput?.value || 0),
                    color: colorInput?.value || '',
                    size: sizeInput?.value || '',
                    quantity: parseInt(quantityInput?.value || 1),
                    comment: commentInput?.value || '',
                    marketplace: marketplace
                };
            });

            if (!full_name || !telegram_username || !country || items.length === 0) {
                alert("⚠️ Заполните все поля.");
                return;
            }

            const requestData = {
                command: "create_order",
                full_name: full_name,
                telegram_username: telegram_username,
                country: country,
                items: items
            };

            console.log("Отправляемые данные:", JSON.stringify(requestData, null, 2));
            tg.sendData(JSON.stringify(requestData));
            alert("✅ Заказ успешно отправлен!");
        }

        tg.ready();
    </script>
</body>
</html>
