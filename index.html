<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT Logistics Mini-App</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #0088cc;
            color: white;
        }
        .button:hover {
            background-color: #007bb5;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        label {
            margin-right: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOLT Logistics</h1>
        <button class="button" onclick="toggleSection('calculator')">🧮 Калькулятор</button>
        <button class="button" onclick="createNewOrder()">📝 Создать новый заказ</button>
        <button class="button" onclick="toggleSection('my-orders')">📦 Мои заказы</button>
        <button class="button" id="manager-button" style="display: none;" onclick="toggleSection('manager')">🔒 Панель менеджера</button>
        <div id="calculator" class="section">
            <h2>Калькулятор</h2>
            <label for="country">Страна выкупа:</label>
            <select id="country" class="form-control" onchange="handleCountryChange()">
                <option value="" selected disabled>Выберите страну</option>
                <option value="china">Китай 🇨🇳</option>
                <option value="europe">Европа 🇪🇺</option>
                <option value="usa">США 🇺🇸</option>
                <option value="japan">Япония 🏴󠁧󠁢󠁳󠁣󠁴󠁿</option>
            </select>
            <div id="marketplace-section" style="display: none;">
                <br>
                <label for="marketplace">Маркетплейс:</label>
                <select id="marketplace" class="form-control">
                    <option value="poizon_taobao_weidan">Poizon/Taobao/Weidan и др.</option>
                    <option value="weechat_yupoo_goofish">Weechat/YuPoo/Goofish</option>
                </select>
            </div>
            <br>
            <label for="price">Цена (в валюте страны):</label>
            <input type="number" id="price" step="any" required class="form-control">
            <br>
            <button class="button" onclick="calculate()">Рассчитать</button>
            <div id="result" class="result"></div>
        </div>
        <div id="my-orders" class="section">
            <h2>Мои заказы</h2>
            <table id="my-orders-table" class="table">
                <thead>
                    <tr>
                        <th>Номер заказа</th>
                        <th>Фото-отчет</th>
                        <th>Этап</th>
                    </tr>
                </thead>
                <tbody id="user-orders-container">
                    <!-- Заказы будут загружаться здесь -->
                </tbody>
            </table>
        </div>
        <div id="manager" class="section">
            <h2>Панель менеджера</h2>
            <table id="manager-orders-table" class="table">
                <thead>
                    <tr>
                        <th>Номер заказа</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="manager-orders-container">
                    <!-- Заказы будут загружаться здесь -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;

        // Получаем ID текущего пользователя
        const userId = tg.initDataUnsafe.user.id;

        // Проверяем, является ли пользователь менеджером
        const isManager = [919034275, 372145026, 6432717873].includes(userId);
        if (isManager) {
            document.getElementById('manager-button').style.display = 'block';
        }

        function toggleSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        function handleCountryChange() {
            const country = document.getElementById('country').value;
            const marketplaceSection = document.getElementById('marketplace-section');
            if (country === 'china') {
                marketplaceSection.style.display = 'block';
            } else {
                marketplaceSection.style.display = 'none';
            }
        }

        // Инициализация состояния при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            const countrySelect = document.getElementById('country');
            handleCountryChange(); // Вызываем функцию для корректной инициализации
        });

        function calculate() {
            const country = document.getElementById('country').value;
            const marketplace = country === 'china' ? document.getElementById('marketplace').value : null;
            const price = parseFloat(document.getElementById('price').value);

            if (!country) {
                alert('Выберите страну выкупа.');
                return;
            }

            if (isNaN(price) || price <= 0) {
                alert('Введите корректную цену.');
                return;
            }

            let result = 0;
            let currency = '';
            let commission = 0;
            let exchangeRate = 0;

            switch (country) {
                case 'china':
                    currency = 'CNY';
                    exchangeRate = 14.5;
                    commission = marketplace === 'poizon_taobao_weidan' ? 0.08 : 0.13; // 8% или 13%
                    break;
                case 'europe':
                    currency = 'EUR';
                    exchangeRate = 105.3;
                    commission = 0.05; // 5%
                    break;
                case 'usa':
                    currency = 'USD';
                    exchangeRate = 98.1;
                    commission = 0.1; // 10%
                    break;
                case 'japan':
                    currency = 'JPY';
                    exchangeRate = 0.72;
                    commission = 0.03; // 3%
                    break;
                default:
                    alert('Выберите страну выкупа.');
                    return;
            }

            result = (price * exchangeRate) * (1 + commission);
            document.getElementById('result').innerText = `Итоговая стоимость: ${result.toFixed(2)} ₽`;
        }

        function createNewOrder() {
            // Отправляем команду /create_new_order в чат с ботом
            tg.sendData(JSON.stringify({ command: 'create_new_order' }));
            // Возвращаемся в мини-апп после создания заказа
            bot.send_message(user_id, "Ваш заказ на рассмотрении");
        }

        // Обработка данных от бота
        tg.onEvent('web_app_data', function(data) {
            const response = JSON.parse(data.data);
            if (response.command === 'track_order') {
                document.getElementById('order-status').innerText = `Статус: ${response.status}`;
            } else if (response.command === 'create_order') {
                alert(`Заказ #${response.order_id} успешно создан.`);
                toggleSection('calculator'); // Вернуться к калькулятору после создания заказа
            } else if (response.command === 'edit_order_status') {
                alert(`Статус заказа #${response.order_id} изменен на: ${response.status}`);
                toggleSection('manager');
            } else if (response.command === 'add_comment') {
                alert(`Комментарий к заказу #${response.order_id} добавлен.`);
            } else if (response.command === 'attach_photo') {
                alert(`Фотография к заказу #${response.order_id} прикреплена.`);
            } else if (response.command === 'send_requisites') {
                alert(`Реквизиты к заказу #${response.order_id} отправлены.`);
            }
        });
        tg.ready();
    </script>
</body>
</html>
