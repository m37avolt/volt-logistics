<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT Logistics Mini-App</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #0088cc;
            color: white;
        }
        .button:hover {
            background-color: #007bb5;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        label {
            margin-right: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
        /* Стили для формы создания заказа */
        .order-form {
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .item-row input[type="file"],
        .item-row input[type="text"] {
            width: 100%;
            margin: 5px 0;
        }
        .add-item-button {
            margin-top: 20px;
        }
        .user-info {
            margin-top: 30px;
        }
        .submit-order-button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOLT Logistics</h1>
        <button class="button" onclick="toggleSection('calculator')">🧮 Калькулятор</button>
        <button class="button" onclick="toggleSection('create-order')">📝 Создать новый заказ</button>
        <button class="button" onclick="toggleSection('my-orders')">📦 Мои заказы</button>
        <button class="button" id="manager-button" style="display: none;" onclick="toggleSection('manager')">🔒 Панель менеджера</button>
        <div id="calculator" class="section">
            <h2>Калькулятор</h2>
            <label for="country">Страна выкупа:</label>
            <select id="country" class="form-control" onchange="handleCountryChange()">
                <option value="" selected disabled>Выберите страну</option>
                <option value="china">Китай 🇨🇳</option>
                <option value="europe">Европа 🇪🇺</option>
                <option value="usa">США 🇺🇸</option>
                <option value="japan">Япония 🏴󠁧󠁢󠁳󠁣󠁴󠁿</option>
            </select>
            <div id="marketplace-section" style="display: none;">
                <br>
                <label for="marketplace">Маркетплейс:</label>
                <select id="marketplace" class="form-control">
                    <option value="poizon_taobao_weidan">Poizon/Taobao/Weidan и др.</option>
                    <option value="weechat_yupoo_goofish">Weechat/YuPoo/Goofish</option>
                </select>
            </div>
            <br>
            <label for="price">Цена (в валюте страны):</label>
            <input type="number" id="price" step="any" required class="form-control">
            <br>
            <button class="button" onclick="calculate()">Рассчитать</button>
            <div id="result" class="result"></div>
        </div>
        <div id="create-order" class="section">
            <h2>Создание Заказа</h2>
            <form id="order-form" class="order-form">
                <table id="order-table" class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Фото</th>
                            <th>Цвет</th>
                            <th>Размер</th>
                            <th>Кол-во</th>
                        </tr>
                    </thead>
                    <tbody id="items-container">
                        <!-- Первый товар -->
                        <tr class="item-row">
                            <td>Товар #1</td>
                            <td><input type="file" class="form-control-file item-photo" accept="image/*" required></td>
                            <td><input type="text" class="form-control item-color" required></td>
                            <td><input type="text" class="form-control item-size" required></td>
                            <td><input type="number" class="form-control item-quantity" min="1" required></td>
                        </tr>
                    </tbody>
                </table>
                <button type="button" class="button add-item-button" onclick="addItem()">Добавить товар</button>
                <br><br>
                <div class="user-info">
                    <label for="full-name">Ваше ФИО:</label>
                    <input type="text" id="full-name" class="form-control" required>
                    <br>
                    <label for="telegram-username">Ваш юзернейм в Telegram:</label>
                    <input type="text" id="telegram-username" class="form-control" required>
                </div>
                <button type="button" class="button submit-order-button" onclick="submitOrder()">Отправить заказ</button>
            </form>
        </div>
        <div id="edit-order" class="section">
            <h2>Редактирование Заказа</h2>
            <label for="edit-order-id">Номер заказа:</label>
            <input type="number" id="edit-order-id" readonly class="form-control">
            <br>
            <label for="new-status">Новый статус:</label>
            <input type="text" id="new-status" required class="form-control">
            <br>
            <button class="button" onclick="editOrderStatus()">Редактировать Статус Заказа</button>
            <br>
            <label for="comment-text">Комментарий:</label>
            <textarea id="comment-text" class="form-control" rows="3"></textarea>
            <br>
            <button class="button" onclick="addComment()">Добавить Комментарий</button>
            <br>
            <label for="photo-upload">Прикрепить Фотографию:</label>
            <input type="file" id="photo-upload" accept="image/*" class="form-control-file">
            <br>
            <button class="button" onclick="attachPhoto()">Прикрепить Фотографию</button>
        </div>
        <div id="my-orders" class="section">
            <h2>Мои заказы</h2>
            <table id="my-orders-table" class="table">
                <thead>
                    <tr>
                        <th>Номер заказа</th>
                        <th>Фото-отчет</th>
                        <th>Этап</th>
                    </tr>
                </thead>
                <tbody id="user-orders-container">
                    <!-- Заказы будут загружаться здесь -->
                </tbody>
            </table>
        </div>
        <div id="manager" class="section">
            <h2>Панель менеджера</h2>
            <table id="manager-orders-table" class="table">
                <thead>
                    <tr>
                        <th>Номер заказа</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="manager-orders-container">
                    <!-- Заказы будут загружаться здесь -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user.id;
        const isManager = [919034275, 372145026, 6432717873].includes(userId);
        if (isManager) {
            document.getElementById('manager-button').style.display = 'block';
        }
        function toggleSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
            if (sectionId === 'my-orders') {
                loadUserOrders();
            } else if (sectionId === 'manager') {
                loadManagerOrders();
            }
        }
        function handleCountryChange() {
            const country = document.getElementById('country').value;
            const marketplaceSection = document.getElementById('marketplace-section');
            if (country === 'china') {
                marketplaceSection.style.display = 'block';
            } else {
                marketplaceSection.style.display = 'none';
            }
        }
        // Инициализация состояния при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            const countrySelect = document.getElementById('country');
            handleCountryChange(); // Вызываем функцию для корректной инициализации
        });
        function calculate() {
            const country = document.getElementById('country').value;
            const marketplace = country === 'china' ? document.getElementById('marketplace').value : null;
            const price = parseFloat(document.getElementById('price').value);
            if (!country) {
                alert('Выберите страну выкупа.');
                return;
            }
            if (isNaN(price) || price <= 0) {
                alert('Введите корректную цену.');
                return;
            }
            let result = 0;
            let currency = '';
            let commission = 0;
            let exchangeRate = 0;
            switch (country) {
                case 'china':
                    currency = 'CNY';
                    exchangeRate = 14.5;
                    commission = marketplace === 'poizon_taobao_weidan' ? 0.08 : 0.13; // 8% или 13%
                    break;
                case 'europe':
                    currency = 'EUR';
                    exchangeRate = 105.3;
                    commission = 0.05; // 5%
                    break;
                case 'usa':
                    currency = 'USD';
                    exchangeRate = 98.1;
                    commission = 0.1; // 10%
                    break;
                case 'japan':
                    currency = 'JPY';
                    exchangeRate = 0.72;
                    commission = 0.03; // 3%
                    break;
                default:
                    alert('Выберите страну выкупа.');
                    return;
            }
            result = (price * exchangeRate) * (1 + commission);
            document.getElementById('result').innerText = `Итоговая стоимость: ${result.toFixed(2)} ₽`;
        }
        function addItem() {
            const container = document.getElementById('items-container');
            const rowCount = container.children.length + 1;
            const newItem = document.createElement('tr');
            newItem.className = 'item-row';
            newItem.innerHTML = `
                <td>Товар #${rowCount}</td>
                <td><input type="file" class="form-control-file item-photo" accept="image/*" required></td>
                <td><input type="text" class="form-control item-color" required></td>
                <td><input type="text" class="form-control item-size" required></td>
                <td><input type="number" class="form-control item-quantity" min="1" required></td>
            `;
            container.appendChild(newItem);
        }
        function submitOrder() {
            const items = [];
            const rows = document.querySelectorAll('#items-container .item-row');
            let isValid = true;

            rows.forEach(row => {
                const photoInput = row.querySelector('.item-photo');
                const colorInput = row.querySelector('.item-color');
                const sizeInput = row.querySelector('.item-size');
                const quantityInput = row.querySelector('.item-quantity');

                if (!photoInput.files.length || !colorInput.value.trim() || !sizeInput.value.trim() || !quantityInput.value) {
                    isValid = false;
                    return;
                }

                const reader = new FileReader();
                reader.readAsDataURL(photoInput.files[0]);
                reader.onload = () => {
                    items.push({
                        photo: reader.result.split(',')[1],
                        color: colorInput.value,
                        size: sizeInput.value,
                        quantity: parseInt(quantityInput.value)
                    });

                    if (items.length === rows.length) {
                        sendOrderData(items);
                    }
                };
            });

            if (!isValid) {
                alert('Пожалуйста, заполните все поля для каждого товара.');
            }
        }
        function sendOrderData(items) {
            const fullName = document.getElementById('full-name').value.trim();
            const telegramUsername = document.getElementById('telegram-username').value.trim();

            if (!fullName || !telegramUsername) {
                alert('Пожалуйста, укажите ваше ФИО и юзернейм в Telegram.');
                return;
            }

            const requestData = {
                command: 'create_order',
                full_name: fullName,
                telegram_username: telegramUsername,
                items: items
            };

            tg.sendData(JSON.stringify(requestData));
            toggleSection('calculator'); // Возвращаемся к калькулятору
            alert('Ваш заказ на рассмотрении! Ожидайте присвоения номера.');
        }
        function editOrderStatus() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const orderId = parseInt(document.getElementById('edit-order-id').value);
            const newStatus = document.getElementById('new-status').value;
            if (isNaN(orderId) || orderId <= 0 || newStatus.trim() === '') {
                alert('Введите корректные данные.');
                return;
            }
            const requestData = {
                command: 'edit_order_status',
                order_id: orderId,
                status: newStatus
            };
            tg.sendData(JSON.stringify(requestData));
        }
        function addComment() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const orderId = parseInt(document.getElementById('edit-order-id').value);
            const commentText = document.getElementById('comment-text').value;
            if (isNaN(orderId) || orderId <= 0 || commentText.trim() === '') {
                alert('Введите корректные данные.');
                return;
            }
            const requestData = {
                command: 'add_comment',
                order_id: orderId,
                comment: commentText
            };
            tg.sendData(JSON.stringify(requestData));
        }
        function attachPhoto() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const fileInput = document.getElementById('photo-upload');
            if (!fileInput.files.length) {
                alert('Прикрепите фотографию.');
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result.split(',')[1];
                const requestData = {
                    command: 'attach_photo',
                    order_id: parseInt(document.getElementById('edit-order-id').value),
                    photo: base64Image
                };
                tg.sendData(JSON.stringify(requestData));
            };
            reader.readAsDataURL(file);
        }
        function sendRequisites() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const phoneNumber = document.getElementById('phone-number').value;
            const amount = parseFloat(document.getElementById('requisite-amount').value);
            const bank = document.getElementById('bank').value;
            if (phoneNumber.trim() === '' || isNaN(amount) || amount <= 0 || bank.trim() === '') {
                alert('Введите корректные данные.');
                return;
            }
            const requestData = {
                command: 'send_requisites',
                order_id: parseInt(document.getElementById('edit-order-id').value),
                phone_number: phoneNumber,
                amount: amount,
                bank: bank
            };
            tg.sendData(JSON.stringify(requestData));
        }
        // Обработка данных от бота
        tg.onEvent('web_app_data', function(data) {
            const response = JSON.parse(data.data);
            if (response.command === 'track_order') {
                document.getElementById('order-status').innerText = `Статус: ${response.status}`;
            } else if (response.command === 'create_order') {
                alert(`Заказ #${response.order_id} успешно создан.`);
                toggleSection('calculator'); // Вернуться к калькулятору после создания заказа
            } else if (response.command === 'edit_order_status') {
                alert(`Статус заказа #${response.order_id} изменен на: ${response.status}`);
                toggleSection('manager');
            } else if (response.command === 'add_comment') {
                alert(`Комментарий к заказу #${response.order_id} добавлен.`);
            } else if (response.command === 'attach_photo') {
                alert(`Фотография к заказу #${response.order_id} прикреплена.`);
            } else if (response.command === 'send_requisites') {
                alert(`Реквизиты к заказу #${response.order_id} отправлены.`);
            }
        });
        tg.ready();
    </script>
</body>
</html>
