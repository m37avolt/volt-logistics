<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT Logistics Mini-App</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #0088cc;
            color: white;
        }
        .button:hover {
            background-color: #007bb5;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        label {
            margin-right: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOLT Logistics</h1>
        <div id="calculator" class="section active">
            <h2>Калькулятор</h2>
            <label for="marketplace">Маркетплейс:</label>
            <select id="marketplace" class="form-control">
                <option value="china">Китай 🇨🇳</option>
                <option value="europe">Европа 🇪🇺</option>
                <option value="usa">США 🇺🇸</option>
                <option value="japan">Япония 🏺</option>
            </select>
            <br>
            <label for="price">Цена (в валюте маркетплейса):</label>
            <input type="number" id="price" step="any" required class="form-control">
            <br>
            <button class="button" onclick="calculate()">Рассчитать</button>
            <div id="result" class="result"></div>
        </div>
        <div id="track-order" class="section">
            <h2>Отслеживание Заказа</h2>
            <label for="order-id">Номер заказа:</label>
            <input type="number" id="order-id" required class="form-control">
            <br>
            <button class="button" onclick="trackOrder()">Отследить Заказ</button>
            <div id="order-status" class="order-status"></div>
        </div>
        <div id="manager" class="section">
            <h2>Панель Менеджера</h2>
            <label for="edit-order-id">Номер заказа:</label>
            <input type="number" id="edit-order-id" required class="form-control">
            <br>
            <label for="new-status">Новый статус:</label>
            <input type="text" id="new-status" required class="form-control">
            <br>
            <button class="button" onclick="editOrderStatus()">Редактировать Статус Заказа</button>
            <br>
            <label for="comment-text">Комментарий:</label>
            <textarea id="comment-text" class="form-control" rows="3"></textarea>
            <br>
            <button class="button" onclick="addComment()">Добавить Комментарий</button>
            <br>
            <label for="photo-upload">Прикрепить Фотографию:</label>
            <input type="file" id="photo-upload" accept="image/*" class="form-control-file">
            <br>
            <button class="button" onclick="attachPhoto()">Прикрепить Фотографию</button>
        </div>
        <button class="button" onclick="toggleSection('calculator')">Калькулятор</button>
        <button class="button" onclick="toggleSection('track-order')">Отследить Заказ</button>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        // Проверка, является ли пользователь менеджером
        const isManager = tg.initDataUnsafe.user.id in [919034275, 372145026, 6432717873];
        if (isManager) {
            const managerButton = document.createElement('button');
            managerButton.className = 'button';
            managerButton.innerText = 'ПАНЕЛЬ МЕНЕДЖЕРА';
            managerButton.onclick = () => toggleSection('manager');
            document.querySelector('.container').appendChild(managerButton);
        }

        function toggleSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        function calculate() {
            const marketplace = document.getElementById('marketplace').value;
            const price = parseFloat(document.getElementById('price').value);
            if (isNaN(price) || price <= 0) {
                alert('Введите корректную цену.');
                return;
            }
            let result = 0;
            let currency = '';
            let commissionPercentage = 0;
            let exchangeRate = 0;
            let commission = 0;
            let advancePayment = 0;
            let finalMessage = '';
            let rubles = 0;

            switch (marketplace) {
                case 'china':
                    currency = 'CNY';
                    exchangeRate = 14.5;
                    if (price <= 1000) {
                        commissionPercentage = 25;
                    } else if (price <= 5000) {
                        commissionPercentage = 15;
                    } else {
                        finalMessage = "Цена договорная. Пишите в лс менеджеру.";
                        break;
                    }
                    rubles = (price * exchangeRate) * (1 + commissionPercentage / 100);
                    commission = rubles * commissionPercentage / 100;
                    advancePayment = price * (1 + commissionPercentage / 100);
                    finalMessage = (f"Итоговая стоимость товаров: ~{rubles.toFixed(2)} ₽\n\n"
                                    f"Курс юаня при подсчете: 1 CNY - {exchangeRate}\n\n"
                                    "Сроки доставки:\n"
                                    "🇨🇳 Срок доставки по Китаю до нашего склада зависит от продавца (в среднем 3 дня с момента отправки.)\n"
                                    "🇷🇺 До России (Москва) от склада в Китае:\n\t▫️Авто Express: (9-15 дней)\n\t▫️Обычное авто: (18-29 дней)\n\t▫️Авиа: (3-5 дней)\n\n"
                                    f"Оплачивается сразу: {advancePayment.toFixed(2)} ¥\n"
                                    "ВАЖНО: Доставка по Китаю возможно будет иметь другую стоимость\n\n"
                                    "▫️Доставка Китай -> Россия оплачивается отдельно, только после приезда груза на склад в Китае.\n\n"
                                    "Расчет:\n"
                                    "▫️Страхование груза (3%): " + ((price * exchangeRate) * 0.03).toFixed(2) + " ₽\n"
                                    "▫️Комиссия за выкуп и проверка товара на брак (5%): " + ((price * exchangeRate) * 0.05).toFixed(2) + " ₽\n"
                                    "▫️Комиссия за выкуп и проверку товара на брак (" + commissionPercentage + "%): " + commission.toFixed(2) + " ₽\n\n"
                                    "Оформить заказ или задать любой интересующий вопрос: @VoltZakaz");
                    break;
                case 'europe':
                    currency = 'EUR';
                    exchangeRate = 105.3;
                    if (price <= 1000) {
                        commissionPercentage = 25;
                    } else if (price <= 5000) {
                        commissionPercentage = 15;
                    } else {
                        finalMessage = "Цена договорная. Пишите в лс менеджеру.";
                        break;
                    }
                    rubles = price * exchangeRate;
                    commission = rubles * commissionPercentage / 100;
                    totalCost = rubles + commission;
                    advancePayment = price * (1 + commissionPercentage / 100);
                    finalMessage = (f"Итоговая стоимость товаров: ~{totalCost.toFixed(2)} ₽\n\n"
                                    f"Курс евро при подсчете: 1 EUR - {exchangeRate}\n\n"
                                    "Сроки доставки:\n"
                                    "🇪🇺 1-7 дней по Европе\n"
                                    "🇷🇺 10-14 дней до вашей двери\n\n"
                                    f"Итоговая стоимость: {advancePayment.toFixed(2)} €\n\n"
                                    "Оформить заказ или задать любой интересующий вопрос: @VoltZakaz");
                    break;
                case 'usa':
                    currency = 'USD';
                    exchangeRate = 98.1;
                    if (price <= 1000) {
                        commissionPercentage = 25;
                    } else if (price <= 5000) {
                        commissionPercentage = 15;
                    } else {
                        finalMessage = "Цена договорная. Пишите в лс менеджеру.";
                        break;
                    }
                    rubles = price * exchangeRate;
                    commission = rubles * commissionPercentage / 100;
                    totalCost = rubles + commission;
                    advancePayment = price * (1 + commissionPercentage / 100);
                    finalMessage = (f"Итоговая стоимость товаров: ~{totalCost.toFixed(2)} ₽\n\n"
                                    f"Курс доллара при подсчете: 1 USD - {exchangeRate}\n\n"
                                    "Сроки доставки:\n"
                                    "🇺🇸 1-7 дней по США\n"
                                    "🇷🇺 10-14 дней до вашей двери\n\n"
                                    f"Итоговая стоимость: {advancePayment.toFixed(2)} $\n\n"
                                    "Оформить заказ или задать любой интересующий вопрос: @VoltZakaz");
                    break;
                case 'japan':
                    currency = 'JPY';
                    exchangeRate = 0.72;
                    if (price <= 1000) {
                        commissionPercentage = 25;
                    } else if (price <= 5000) {
                        commissionPercentage = 15;
                    } else {
                        finalMessage = "Цена договорная. Пишите в лс менеджеру.";
                        break;
                    }
                    rubles = price * exchangeRate;
                    commission = rubles * commissionPercentage / 100;
                    totalCost = rubles + commission;
                    advancePayment = price * (1 + commissionPercentage / 100);
                    finalMessage = (f"Итоговая стоимость товаров: ~{totalCost.toFixed(2)} ₽\n\n"
                                    f"Курс иена при подсчете: 1 JPY - {exchangeRate}\n\n"
                                    "Сроки доставки:\n"
                                    "🇯🇵 Внутри Японии: В среднем 1-3 дня\n"
                                    "🇷🇺 До России (Ваш город): 12-20 дней (зависит от вашего города)\n\n"
                                    f"Оплачивается сразу: {advancePayment.toFixed(2)} ¥\n\n"
                                    "Оформить заказ или задать любой интересующий вопрос: @VoltZakaz");
                    break;
                default:
                    alert('Выберите маркетплейс');
                    return;
            }

            document.getElementById('result').innerText = finalMessage;
        }

        function trackOrder() {
            const orderId = parseInt(document.getElementById('order-id').value);
            if (isNaN(orderId) || orderId <= 0) {
                alert('Введите корректный номер заказа.');
                return;
            }
            const requestData = {
                command: 'track_order',
                order_id: orderId
            };
            tg.sendData(JSON.stringify(requestData));
        }

        function editOrderStatus() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const orderId = parseInt(document.getElementById('edit-order-id').value);
            const newStatus = document.getElementById('new-status').value;
            if (isNaN(orderId) || orderId <= 0 || newStatus.trim() === '') {
                alert('Введите корректные данные.');
                return;
            }
            const requestData = {
                command: 'edit_order_status',
                order_id: orderId,
                status: newStatus
            };
            tg.sendData(JSON.stringify(requestData));
        }

        function addComment() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const orderId = parseInt(document.getElementById('edit-order-id').value);
            const commentText = document.getElementById('comment-text').value;
            if (isNaN(orderId) || orderId <= 0 || commentText.trim() === '') {
                alert('Введите корректные данные.');
                return;
            }
            const requestData = {
                command: 'add_comment',
                order_id: orderId,
                comment: commentText
            };
            tg.sendData(JSON.stringify(requestData));
        }

        function attachPhoto() {
            if (!isManager) {
                alert('У вас нет прав для выполнения этой операции.');
                return;
            }
            const fileInput = document.getElementById('photo-upload');
            if (!fileInput.files.length) {
                alert('Прикрепите фотографию.');
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result.split(',')[1];
                const requestData = {
                    command: 'attach_photo',
                    order_id: parseInt(document.getElementById('edit-order-id').value),
                    photo: base64Image
                };
                tg.sendData(JSON.stringify(requestData));
            };
            reader.readAsDataURL(file);
        }

        // Обработка данных от бота
        tg.onEvent('web_app_data', function(data) {
            const response = JSON.parse(data.data);
            if (response.command === 'track_order') {
                document.getElementById('order-status').innerText = `Статус: ${response.status}`;
            } else if (response.command === 'create_order') {
                alert(`Заказ #${response.order_id} успешно создан.`);
                toggleSection('calculator'); // Возвращаемся к калькулятору после создания заказа
            } else if (response.command === 'edit_order_status') {
                alert(`Статус заказа #${response.order_id} изменен на: ${response.status}`);
            } else if (response.command === 'add_comment') {
                alert(`Комментарий к заказу #${response.order_id} добавлен.`);
            } else if (response.command === 'attach_photo') {
                alert(`Фотография к заказу #${response.order_id} прикреплена.`);
            } else if (response.command === 'send_requisites') {
                alert(`Реквизиты к заказу #${response.order_id} отправлены.`);
            }
        });

        tg.ready();
    </script>
</body>
</html>
