<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Logistics Mobile App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #141414;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 375px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
        }

        /* Широкая карточка акций - точные размеры как в оригинале */
        .promotions-card {
            background-color: #2e2e2e;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 110px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .promotions-card:active {
            transform: scale(0.98);
        }

        .promotions-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Увеличенная серая иконка тега */
        .tag-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            opacity: 0.6;
        }

        .promotions-title {
            font-size: 24px;
            font-weight: 500;
            color: white;
        }

        /* Увеличенная голубая иконка процентов */
        .discount-badge {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        /* Основная сетка квадратных карточек */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card {
            background-color: #2e2e2e;
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease;
            cursor: pointer;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-gray {
            background-color: #626262;
        }

        /* Главный логотип - просто кнопка с прозрачным фоном */
        .logo-button {
            border: none;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.15s ease;
            padding: 0;
            background: transparent;
        }

        .logo-button:active {
            transform: scale(0.98);
        }

        /* Логотип с прозрачным фоном и закругленными краями */
        .company-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Увеличенные иконки в карточках */
        .card-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.1;
            color: white;
        }

        /* Нижняя секция */
        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .reviews-card {
            background-color: #626262;
            border-radius: 20px;
            padding: 20px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .reviews-card:active {
            transform: scale(0.98);
        }

        /* Сетка 2x2 для всех 4 приложений */
        .apps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 6px;
            aspect-ratio: 1;
        }

        .small-app {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .small-app:active {
            transform: scale(0.95);
        }

        .small-app img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Текст внизу */
        .bottom-text {
            text-align: center;
            color: #737373;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Фиксированное меню внизу экрана - точные размеры из Figma */
        .fixed-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 386px;
            height: 85px;
            background-color: #2e2e2e;
            border-radius: 20px 20px 20px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 12px;
        }

        /* Кнопки меню - точные размеры из CSS */
        .nav-button {
            width: 61px;
            height: 61px;
            background-color: #000000;
            border: none;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
        }

        .nav-button:active {
            transform: scale(0.95);
        }

        /* Размеры иконок в меню согласно Figma CSS */
        .nav-button-profile img {
            width: 43px;
            height: 43px;
            object-fit: contain;
        }

        .nav-button-chat img {
            width: 67px;
            height: 69px;
            object-fit: contain;
        }

        .nav-button-lock img {
            width: 47px;
            height: 47px;
            object-fit: contain;
        }

        /* Fallback styles */
        .image-fallback {
            display: none;
            align-items: center;
            justify-content: center;
            background-color: #01dbff;
            border-radius: 20px;
            color: white;
            font-weight: bold;
        }

        .loading {
            opacity: 0.7;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Широкая карточка акций с увеличенными иконками -->
        <div class="promotions-card">
            <div class="promotions-left">
                <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v1_115-ll2JkopnVOpygY3dttWZ1v8LOldIyg.png" 
                     alt="Tag Icon" 
                     class="tag-icon loading"
                     onerror="handleImageError(this, '🏷')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 60px; height: 60px;">🏷</div>
                <div class="promotions-title">акции</div>
            </div>
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_114.png" 
                 alt="Discount" 
                 class="discount-badge loading"
                 onerror="handleImageError(this, '%')"
                 onload="handleImageLoad(this)">
            <div class="image-fallback" style="width: 70px; height: 70px; font-size: 24px;">%</div>
        </div>

        <!-- Первый ряд квадратных карточек -->
        <div class="grid">
            <!-- Оформить заказ с увеличенной иконкой -->
            <div class="card">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_145.png" 
                     alt="Shopping Cart" 
                     class="card-icon loading"
                     onerror="handleImageError(this, '🛒')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 60px; height: 60px;">🛒</div>
                <div class="card-title">
                    оформить<br>заказ
                </div>
            </div>

            <!-- Логотип Volt Logistics на прозрачном фоне с закругленными краями -->
            <button class="logo-button" onclick="handleLogoClick()" aria-label="Volt Logistics - Главное меню">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_14.png" 
                     alt="Volt Logistics Logo" 
                     class="company-logo loading"
                     onerror="handleImageError(this, 'V')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 100%; height: 100%; font-size: 36px; aspect-ratio: 1;">V</div>
            </button>
        </div>

        <!-- Второй ряд квадратных карточек -->
        <div class="grid">
            <!-- Актуальный курс -->
            <div class="card">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_136.png" 
                     alt="Currency Exchange" 
                     class="card-icon loading"
                     onerror="handleImageError(this, '₽¥')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 60px; height: 60px;">₽¥</div>
                <div class="card-title">
                    актуальный<br>курс
                </div>
            </div>

            <!-- Рассчитать заказ -->
            <div class="card">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_150.png" 
                     alt="Calculator" 
                     class="card-icon loading"
                     style="width: 100%; height: 65px; margin-bottom: 12px;"
                     onerror="handleImageError(this, '=')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 100%; height: 65px;">=</div>
                <div class="card-title">
                    рассчитать<br>заказ
                </div>
            </div>
        </div>

        <!-- Нижняя секция -->
        <div class="bottom-section">
            <!-- Наши отзывы -->
            <div class="reviews-card">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v55_17.png" 
                     alt="Reviews" 
                     class="card-icon loading"
                     onerror="handleImageError(this, '★')"
                     onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 60px; height: 60px;">★</div>
                <div class="card-title">
                    наши<br>отзывы
                </div>
            </div>
            
            <!-- Сетка 2x2 для всех 4 приложений -->
            <div class="apps-grid">
                <!-- POIZON (верхний левый) -->
                <div class="small-app">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v1_8-mk0TbD1bW817BpLE1toKsoE7N6Wo5V.png" alt="POIZON App">
                </div>
                <!-- Taobao (верхний правый) -->
                <div class="small-app">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v1_9-QMHUvSYcuOBx1GWz1X1uSOjhuscXxz.png" alt="Taobao App">
                </div>
                <!-- Yellow app (нижний левый) -->
                <div class="small-app">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v1_11-Yc1aYr6EWQWLwjihUlmJpk4agZ3vq7.png" alt="Yellow App">
                </div>
                <!-- Help app (нижний правый) -->
                <div class="small-app">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v55_13-F7fFZlZyEVwu7PkClBte3UGRpmzJAZ.png" alt="Help App">
                </div>
            </div>
        </div>

        <!-- Текст внизу -->
        <div class="bottom-text">агентский договор</div>
    </div>

    <!-- Фиксированное меню с точными размерами из Figma -->
    <div class="fixed-nav">
        <button class="nav-button nav-button-profile" onclick="handleNavClick('profile')" aria-label="Профиль">
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v28_55.png" 
                 alt="Profile" 
                 class="loading"
                 onerror="handleImageError(this, '👤')"
                 onload="handleImageLoad(this)">
            <div class="image-fallback" style="width: 43px; height: 43px; font-size: 16px;">👤</div>
        </button>
        
        <button class="nav-button nav-button-chat" onclick="handleNavClick('chat')" aria-label="Чат">
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v55_7.png" 
                 alt="Chat" 
                 class="loading"
                 onerror="handleImageError(this, '💬')"
                 onload="handleImageLoad(this)">
            <div class="image-fallback" style="width: 67px; height: 69px; font-size: 20px;">💬</div>
        </button>
        
        <button class="nav-button nav-button-lock" onclick="handleNavClick('security')" aria-label="Безопасность">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/v177_2-RRx5M4OQMDM2rFzQymIXKJJpHzCMYf.png" 
                 alt="Security Lock" 
                 class="loading"
                 onerror="handleImageError(this, '🔒')"
                 onload="handleImageLoad(this)">
            <div class="image-fallback" style="width: 47px; height: 47px; font-size: 16px;">🔒</div>
        </button>
    </div>

    <script>
        function handleImageError(img, fallbackText) {
            img.style.display = 'none';
            const fallback = img.nextElementSibling;
            if (fallback && fallback.classList.contains('image-fallback')) {
                fallback.style.display = 'flex';
                fallback.textContent = fallbackText;
            }
            console.warn('Failed to load image:', img.src);
        }

        function handleImageLoad(img) {
            img.classList.remove('loading');
        }

        function handleNavClick(section) {
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            console.log(`Navigating to: ${section}`);
        }

        function handleLogoClick() {
            if (navigator.vibrate) {
                navigator.vibrate(75); // Более сильная вибрация для главной кнопки
            }
            console.log('Volt Logistics main logo clicked');
        }

        document.querySelectorAll('.card, .promotions-card, .reviews-card, .small-app').forEach(card => {
            card.addEventListener('click', function() {
                if (navigator.vibrate) {
                    navigator.vibrate(30);
                }
                console.log('Card clicked');
            });
        });

        window.addEventListener('load', function() {
            console.log('Volt Logistics App loaded successfully');
        });
    </script>
</body>
</html>
