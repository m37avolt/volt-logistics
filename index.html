<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Logistics Mobile App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Кнопка акций с изображением -->
        <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1.png" alt="Акции"
            class="promotions-image-button loading" onclick="navigateTo('promotions')"
            onerror="handleImageError(this, 'АКЦИИ')" onload="handleImageLoad(this)" style="cursor: pointer;">
        <div class="image-fallback"
            style="width: 100%; height: 160px; margin-bottom: 12px; font-size: 18px; display: none;">АКЦИИ</div>

        <!-- Первый ряд квадратных карточек -->
        <div class="grid">
            <!-- Оформить заказ -->
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v2.png" alt="Оформить заказ"
                class="card loading" onclick="navigateTo('order')" onerror="handleImageError(this, 'ЗАКАЗ')"
                onload="handleImageLoad(this)" style="cursor: pointer; padding: 0; object-fit: cover;">

            <!-- Логотип Volt Logistics с закруглением -->
            <button class="logo-button" onclick="navigateTo('main')" aria-label="Volt Logistics - Главное меню">
                <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_14.png"
                    alt="Volt Logistics Logo" class="company-logo loading" onerror="handleImageError(this, 'V')"
                    onload="handleImageLoad(this)">
                <div class="image-fallback" style="width: 100%; height: 100%; font-size: 36px; aspect-ratio: 1;">V</div>
            </button>
        </div>

        <!-- Второй ряд квадратных карточек -->
        <div class="grid">
            <!-- Актуальный курс -->
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v3.png" alt="Актуальный курс"
                class="card loading" onclick="navigateTo('currency')" onerror="handleImageError(this, 'КУРС')"
                onload="handleImageLoad(this)" style="cursor: pointer; padding: 0; object-fit: cover;">

            <!-- Рассчитать заказ -->
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v4.png" alt="Рассчитать заказ"
                class="card loading" onclick="navigateTo('calculator')" onerror="handleImageError(this, 'РАСЧЕТ')"
                onload="handleImageLoad(this)" style="cursor: pointer; padding: 0; object-fit: cover;">
        </div>

        <!-- Нижняя секция -->
        <div class="bottom-section">
            <!-- Наши отзывы -->
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v5.png" alt="Наши отзывы"
                class="reviews-card loading" onclick="navigateTo('reviews')" onerror="handleImageError(this, 'ОТЗЫВЫ')"
                onload="handleImageLoad(this)" style="cursor: pointer; padding: 0; object-fit: cover;">

            <!-- Виджет приложений в едином стиле -->
            <div class="apps-widget">
                <div class="apps-grid">
                    <!-- Help приложение с черным фоном -->
                    <div class="small-app help-app" onclick="navigateTo('help')">
                        <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v55_13.png"
                            alt="Help App">
                    </div>
                    <!-- Taobao приложение с закруглением 13px -->
                    <div class="small-app taobao-app" onclick="navigateTo('taobao')">
                        <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_9.png"
                            alt="Taobao App">
                    </div>
                    <!-- Yellow приложение с закруглением 13px -->
                    <div class="small-app yellow-app" onclick="navigateTo('yellow')">
                        <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_11.png"
                            alt="Yellow App">
                    </div>
                    <!-- POIZON приложение с закруглением 13px -->
                    <div class="small-app poizon-app" onclick="navigateTo('poizon')">
                        <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v1_8.png"
                            alt="POIZON App">
                    </div>
                </div>
            </div>
        </div>

        <!-- Текст внизу -->
        <div class="bottom-text">агентский договор</div>
    </div>

    <!-- Фиксированное меню -->
    <nav class="fixed-nav" id="mainNav">
        <button class="nav-button nav-button-profile" onclick="navigateTo('profile')" aria-label="Профиль">
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v28_55.png" alt="Profile">
        </button>
        <button class="nav-button nav-button-chat" onclick="openTelegramManager()" aria-label="Чат с менеджером">
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v55_7.png" alt="Chat">
        </button>
        <button class="nav-button nav-button-lock" onclick="navigateTo('order')" aria-label="Создать заказ">
            <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/v177_2.png" alt="Order">
        </button>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>

</html>
