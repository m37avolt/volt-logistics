<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOLT Logistics</title>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script> 

  <style>
    :root {
      --primary-color: #00DBFF;
      --dark-accent: #141414;
      --black: #000000;
      --white: #FFFFFF;
      --font-family: 'Montserrat', sans-serif;
      --error-color: #ff4d4d;
      --error-bg: #330f0f;
    }

    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--black);
      color: var(--white);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 422px;
      margin: auto;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Заголовок */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--white);
      margin-bottom: 20px;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: var(--primary-color);
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: var(--white);
    }

    input,
    select,
    .button-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 12px;
      font-family: var(--font-family);
    }

    .button-primary {
      background-color: var(--primary-color);
      color: var(--black);
      font-weight: bold;
      cursor: pointer;
    }

    .button-primary:hover {
      background-color: #00aacc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      color: var(--white);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    .photo-preview img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      margin: 5px;
    }

    .log-output {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 150px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 10px;
      overflow-y: auto;
      z-index: 9999;
      border-top: 1px solid #222;
    }

    .log-output::before {
      content: "🧾 Логи:";
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav-button {
      flex: 1 1 calc(50% - 5px);
      padding: 12px;
      background-color: var(--primary-color);
      color: var(--black);
      text-align: center;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-button:hover {
      background-color: #00aacc;
    }

    .section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .invalid {
      border: 2px solid var(--error-color);
      background-color: var(--error-bg);
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.9rem;
      display: none;
    }

    .error-message.visible {
      display: inline-block;
      margin-top: -8px;
      margin-bottom: 8px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal {
      background: var(--dark-accent);
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .modal-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .button-secondary {
      background-color: #555;
    }

    .card {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .card h3 {
      margin-top: 0;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .photo-preview img {
      width: 60px;
      height: 60px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<!-- Основной контейнер -->
<div class="container">

  <!-- Кнопки навигации -->
  <div class="nav-buttons">
    <button class="nav-button" onclick="navigateTo('home')">🏠 Главная</button>
    <button class="nav-button" onclick="navigateTo('calculator')">🧮 Калькулятор</button>
    <button class="nav-button" onclick="navigateTo('create-order')">📝 Создать заказ</button>
    <button class="nav-button" onclick="navigateTo('my-orders')">📦 Мои заказы</button>
    <button class="nav-button" onclick="navigateTo('promotions')">🎁 Акции</button>
  </div>

  <!-- Секция: Главная -->
  <div id="home" class="section active">
    <h2>Добро пожаловать!</h2>
    <p>Выберите действие:</p>
    <ul style="list-style: none; padding: 0;">
      <li><button class="button-primary" onclick="navigateTo('calculator')">🧮 Открыть калькулятор</button></li>
      <li><button class="button-primary" onclick="navigateTo('create-order')">📝 Создать заказ</button></li>
      <li><button class="button-primary" onclick="navigateTo('my-orders')">📦 Посмотреть мои заказы</button></li>
      <li><button class="button-primary" onclick="navigateTo('promotions')">🎁 Перейти к акциям</button></li>
    </ul>
  </div>

  <!-- Секция: Калькулятор -->
  <div id="calculator" class="section">
    <h2>🧮 Калькулятор стоимости</h2>
    <label for="calc-country">Страна выкупа:</label>
    <select id="calc-country" onchange="updateCalculatorFields()" class="form-control">
      <option value="" selected disabled>Выберите страну</option>
      <option value="china">🇨🇳 Китай</option>
      <option value="japan">🇯🇵 Япония</option>
    </select>
    <div id="calc-marketplace-section" style="display: none;">
      <label for="calc-marketplace">Маркетплейс:</label>
      <select id="calc-marketplace" class="form-control">
        <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN И ДР.</option>
        <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
      </select>
    </div>
    <br>
    <label for="price">Цена за единицу:</label>
    <input type="number" id="price" placeholder="Введите цену" required/><br><br>
    <button class="button-primary" onclick="calculate()">Рассчитать</button>
    <div id="result" style="margin-top: 20px;"></div>
  </div>

  <!-- Секция: Создать заказ -->
  <div id="create-order" class="section">
    <h2>📝 Создать новый заказ</h2>
    <label for="country">Страна выкупа:</label>
    <select id="country" onchange="handleCountryChange()" class="form-control">
      <option value="" selected disabled>Выберите страну</option>
      <option value="china">🇨🇳 Китай</option>
      <option value="japan">🇯🇵 Япония</option>
    </select>
    <div id="marketplace-section" style="display: none;">
      <label for="marketplace">Маркетплейс:</label>
      <select id="marketplace" class="form-control">
        <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN И ДР.</option>
        <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
      </select>
    </div>
    <div id="order-form" style="margin-top: 20px; display: none;">
      <h3>Добавьте товар(ы)</h3>
      <div id="items-container"></div>
      <button class="button-primary" onclick="addItem()" style="margin-bottom: 15px;">➕ Добавить товар</button><br>
      <label for="full-name">ФИО:</label>
      <input type="text" id="full-name" required/><br><br>
      <span class="error-message" id="full-name-error">⚠️ Укажите ваше ФИО</span><br>
      <label for="telegram-username">Telegram username:</label>
      <input type="text" id="telegram-username" required/><br><br>
      <span class="error-message" id="telegram-username-error">⚠️ Укажите Telegram username</span><br>
      <button class="button-primary" onclick="submitOrder()">✅ Создать заказ</button>
    </div>
  </div>

  <!-- Секция: Мои заказы -->
  <div id="my-orders" class="section">
    <h2>📦 Мои заказы</h2>
    <table class="table">
      <thead>
        <tr>
          <th>Номер заказа</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="user-orders-container"></tbody>
    </table>
  </div>

  <!-- Секция: Акции -->
  <div id="promotions" class="section">
    <h2>🎁 Акции</h2>
    <div class="card">
      <img src="https://raw.githubusercontent.com/m37avolt/volt-logistics/main/img/discount-1-28.png"  alt="Акция 1" style="width: 100%; max-width: 300px;" />
      <p>Текст о текущих акциях и предложениях</p>
    </div>
    <button class="button-primary" onclick="navigateTo('home')">⬅ Назад</button>
  </div>

  <!-- Подвал -->
  <div class="footer">© VOLT Logistics · 2025</div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal">
    <h3>Предпросмотр заказа</h3>
    <div id="preview-content"></div>
    <div class="modal-buttons">
      <button class="button-primary" onclick="confirmOrder()">Подтвердить</button>
      <button class="button-primary button-secondary" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
</div>

<!-- Логирование -->
<div class="log-output" id="logs"></div>

<script>
  const tg = window.Telegram.WebApp;

  // Получаем ID пользователя из Telegram
  const userId = tg.initDataUnsafe?.user?.id || null;
  const isManager = [919034275, 372145026, 6432717873].includes(userId);

  function log(msg) {
    const logs = document.getElementById("logs");
    if (!logs) return;
    const timestamp = new Date().toLocaleTimeString();
    logs.innerHTML += `[${timestamp}] ${msg}<br>`;
    logs.scrollTop = logs.scrollHeight;
  }

  function toggleSection(sectionId) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove("active"));
    const section = document.getElementById(sectionId);
    if (section) section.classList.add("active");
    log(`🟩 Открыта секция "${sectionId}"`);
  }

  function navigateTo(sectionId) {
    toggleSection(sectionId);
    if (sectionId === "my-orders") fetchOrders();
  }

  let itemIndex = 0;

  function handleCountryChange() {
    const countrySelect = document.getElementById("country");
    const marketplaceSection = document.getElementById("marketplace-section");
    const orderForm = document.getElementById("order-form");
    const itemsContainer = document.getElementById("items-container");

    itemsContainer.innerHTML = "";
    itemIndex = 0;

    const country = countrySelect.value;

    if (country === "china") {
      marketplaceSection.style.display = "block";
      addItem();
    } else if (country === "japan") {
      marketplaceSection.style.display = "none";
      addJapanItem();
    } else {
      alert("Пока доступны только Китай и Япония.");
      return;
    }

    orderForm.style.display = "block";
    log(`🟨 Выбрана страна: ${country}`);
  }

  function highlightField(id, isError) {
    const input = document.getElementById(id);
    const errorLabel = document.getElementById(`${id}-error`);
    if (input) input.classList.toggle("invalid", isError);
    if (errorLabel) errorLabel.classList.toggle("visible", isError);
  }

  function addItem() {
    if (itemIndex >= 10) {
      alert("Максимум 10 товаров. Обратитесь к менеджеру.");
      return;
    }
    itemIndex++;
    const itemsContainer = document.getElementById("items-container");
    const newItem = document.createElement("div");
    newItem.className = "item-row";
    newItem.innerHTML = `
      <hr>
      <h4>Товар #${itemIndex}</h4>
      <label>Загрузите фото:</label>
      <input type="file" class="item-photo" accept="image/*" multiple onchange="previewPhotos(this)">
      <div class="photo-preview" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
      <label for="item-link-${itemIndex}">Ссылка / ID:</label>
      <input type="text" id="item-link-${itemIndex}" placeholder="https://taobao.com/item123  "><br><br>
      <span class="error-message" id="item-link-${itemIndex}-error">⚠️ Укажите ссылку или ID</span>

      <label for="item-price-${itemIndex}">Цена (CNY):</label>
      <input type="number" id="item-price-${itemIndex}" step="any" placeholder="¥ 800"><br><br>
      <span class="error-message" id="item-price-${itemIndex}-error">⚠️ Укажите корректную цену</span>

      <label for="item-color-${itemIndex}">Цвет:</label>
      <input type="text" id="item-color-${itemIndex}" placeholder="Черный / White"><br><br>

      <label for="item-size-${itemIndex}">Размер:</label>
      <input type="text" id="item-size-${itemIndex}" placeholder="M / 42 / EU40"><br><br>

      <label for="item-quantity-${itemIndex}">Количество:</label>
      <input type="number" id="item-quantity-${itemIndex}" min="1" value="1"><br><br>
      <span class="error-message" id="item-quantity-${itemIndex}-error">⚠️ Минимум 1 шт.</span>

      <label for="item-comment-${itemIndex}">Комментарий:</label>
      <input type="text" id="item-comment-${itemIndex}" placeholder="Батч A1 | Упаковать аккуратно"><br><br>

      <button class="button-primary" onclick="removeItem(this)">🗑 Удалить товар</button>
    `;
    itemsContainer.appendChild(newItem);
    log(`🟦 Товар добавлен (#${itemIndex})`);
  }

  function addJapanItem() {
    if (itemIndex >= 10) {
      alert("Максимум 10 товаров. Обратитесь к менеджеру.");
      return;
    }
    itemIndex++;
    const itemsContainer = document.getElementById("items-container");
    const newItem = document.createElement("div");
    newItem.className = "item-row";
    newItem.innerHTML = `
      <hr>
      <h4>Товар #${itemIndex}</h4>
      <label>Загрузите фото:</label>
      <input type="file" class="item-photo" accept="image/*" multiple onchange="previewPhotos(this)">
      <div class="photo-preview" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
      <label for="item-link-${itemIndex}">Ссылка на товар:</label>
      <input type="text" id="item-link-${itemIndex}" placeholder="https://yame.co.jp/item123  "><br><br>
      <span class="error-message" id="item-link-${itemIndex}-error">⚠️ Укажите ссылку</span>

      <label for="item-price-${itemIndex}">Цена (JPY):</label>
      <input type="number" id="item-price-${itemIndex}" step="any" placeholder="¥ 2000"><br><br>
      <span class="error-message" id="item-price-${itemIndex}-error">⚠️ Укажите корректную цену</span>

      <label for="item-color-${itemIndex}">Цвет:</label>
      <input type="text" id="item-color-${itemIndex}" placeholder="Черный / Noir"><br><br>
      <label for="item-size-${itemIndex}">Размер:</label>
      <input type="text" id="item-size-${itemIndex}" placeholder="M / 42 / EU40"><br><br>
      <label for="item-quantity-${itemIndex}">Количество:</label>
      <input type="number" id="item-quantity-${itemIndex}" min="1" value="1"><br><br>
      <span class="error-message" id="item-quantity-${itemIndex}-error">⚠️ Кол-во должно быть больше 0</span>

      <label for="item-comment-${itemIndex}">Комментарий:</label>
      <input type="text" id="item-comment-${itemIndex}" placeholder="Батч, особые условия..."><br><br>
      <button class="button-primary" onclick="removeItem(this)">🗑 Удалить товар</button>
    `;
    itemsContainer.appendChild(newItem);
    log(`🟦 Товар добавлен (#${itemIndex})`);
  }

  function removeItem(button) {
    const itemRow = button.parentElement;
    itemRow.remove();
    updateIndexes();
    log(`🟥 Товар удалён`);
  }

  function updateIndexes() {
    const items = document.querySelectorAll(".item-row");
    items.forEach((row, idx) => {
      row.querySelector("h4").textContent = `Товар #${idx + 1}`;
    });
    itemIndex = items.length;
    log(`🟨 Индексы обновлены`);
  }

  function previewPhotos(input) {
    const preview = input.nextElementSibling;
    preview.innerHTML = "";
    Array.from(input.files).slice(0, 5).forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.createElement("img");
        img.src = e.target.result;
        img.style.width = "60px";
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
    log(`🟨 Загружено ${input.files.length} фото`);
  }

  async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }

  async function submitOrder() {
    try {
      const full_name = document.getElementById("full-name").value.trim();
      const telegram_username = document.getElementById("telegram-username").value.trim();
      const country = document.getElementById("country").value;
      const itemsContainer = document.getElementById("items-container");

      const fullNameError = document.getElementById("full-name-error");
      const telegramUsernameError = document.getElementById("telegram-username-error");

      // Проверка основных полей
      let hasError = false;

      if (!full_name) {
        highlightField("full-name", true);
        fullNameError.textContent = "⚠️ Пожалуйста, укажите ваше ФИО";
        fullNameError.style.display = "block";
        hasError = true;
      } else {
        highlightField("full-name", false);
        fullNameError.style.display = "none";
      }

      if (!telegram_username) {
        highlightField("telegram-0", true);
        telegramUsernameError.textContent = "⚠️ Укажите Telegram username (например, @all0verme)";
        telegramUsernameError.style.display = "block";
        hasError = true;
      } else {
        highlightField("telegram-0", false);
        telegramUsernameError.style.display = "none";
      }

      if (!country) {
        alert("⚠️ Выберите страну выкупа");
        return;
      }

      const items = await Promise.all(Array.from(itemsContainer.children).map(async (itemRow, idx) => {
        const photoInput = itemRow.querySelector(".item-photo");
        const linkOrIdInput = itemRow.querySelector(`#item-link-${idx + 1}`);
        const priceInput = itemRow.querySelector(`#item-price-${idx + 1}`);
        const colorInput = itemRow.querySelector(`#item-color-${idx + 1}`);
        const sizeInput = itemRow.querySelector(`#item-size-${idx + 1}`);
        const quantityInput = itemRow.querySelector(`#item-quantity-${idx + 1}`);
        const commentInput = itemRow.querySelector(`#item-comment-${idx + 1}`);

        const photos = [];
        if (photoInput && photoInput.files) {
          for (const file of photoInput.files) {
            const base64 = await fileToBase64(file);
            photos.push(base64);
          }
        }

        const link_or_id = linkOrIdInput?.value || "";
        const price = parseFloat(priceInput?.value || 0);
        const quantity = parseInt(quantityInput?.value || 1);

        if (!link_or_id) {
          highlightField(`item-link-${idx + 1}`, true);
          document.getElementById(`item-link-${idx + 1}-error`).style.display = "block";
          hasError = true;
        }

        if (!(price > 0)) {
          highlightField(`item-price-${idx + 1}`, true);
          document.getElementById(`item-price-${idx + 1}-error`).style.display = "block";
          hasError = true;
        }

        if (!(quantity > 0)) {
          highlightField(`item-quantity-${idx + 1}`, true);
          document.getElementById(`item-quantity-${idx + 1}-error`).style.display = "block";
          hasError = true;
        }

        return {
          photos: [...Array.from(photoInput?.files || [])].map(f => f.name),
          link_or_id: link_or_id,
          price: price,
          color: colorInput?.value || "",
          size: sizeInput?.value || "",
          quantity: quantity,
          comment: commentInput?.value || ""
        };
      }));

      if (hasError) {
        alert("⚠️ Исправьте поля перед отправкой");
        return;
      }

      const requestData = {
        command: "create_order",
        full_name: full_name,
        telegram_username: telegram_username,
        country: country,
        items: items
      };

      showPreview(requestData);
      log(`🟦 Сформирован объект: ${JSON.stringify(requestData)}`);
    } catch (error) {
      log(`🟥 Ошибка в JS: ${error.message}`);
      alert("❌ Произошла ошибка. Посмотрите консоль для деталей.");
    }
  }

  function showPreview(data) {
    const modal = document.getElementById("preview-modal");
    const preview = document.getElementById("preview-content");
    preview.innerHTML = `<strong>Пользователь:</strong><br>${data.full_name}<br>@${data.telegram_username}<br><br>`;
    data.items.forEach((item, idx) => {
      const itemDiv = document.createElement("div");
      item.photos.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo;
        img.style.width = "60px";
        preview.appendChild(img);
      });
      itemDiv.innerHTML += `<br>Ссылка: ${item.link_or_id}<br>Цена: ${item.price}, Кол-во: ${item.quantity}<br>Цвет: ${item.color}, Размер: ${item.size}<br>Комментарий: ${item.comment}<br><hr>`;
      preview.appendChild(itemDiv);
    });
    modal.style.display = "flex";
    log("🟧 Модальное окно открыто");
  }

  function closeModal() {
    document.getElementById("preview-modal").style.display = "none";
    log("🟧 Модальное окно закрыто");
  }

  function confirmOrder() {
    const full_name = document.getElementById("full-name").value.trim();
    const telegram_username = document.getElementById("telegram-username").value.trim();
    const country = document.getElementById("country").value;
    const itemsContainer = document.getElementById("items-container");

    const items = Array.from(itemsContainer.children).map((itemRow, idx) => {
      const linkOrIdInput = itemRow.querySelector(`#item-link-${idx + 1}`);
      const priceInput = itemRow.querySelector(`#item-price-${idx + 1}`);
      const colorInput = itemRow.querySelector(`#item-color-${idx + 1}`);
      const sizeInput = itemRow.querySelector(`#item-size-${idx + 1}`);
      const quantityInput = itemRow.querySelector(`#item-quantity-${idx + 1}`);
      const commentInput = itemRow.querySelector(`#item-comment-${idx + 1}`);
      const photoInput = itemRow.querySelector(".item-photo");

      return {
        photos: [...Array.from(photoInput?.files || [])].map(f => f.name),
        link_or_id: linkOrIdInput?.value || "",
        price: parseFloat(priceInput?.value || 0),
        color: colorInput?.value || "",
        size: sizeInput?.value || "",
        quantity: parseInt(quantityInput?.value || 1),
        comment: commentInput?.value || ""
      };
    });

    const requestData = {
      command: "create_order",
      full_name: full_name,
      telegram_username: telegram_username,
      country: country,
      items: items
    };

    log(`🟦 Отправляемые данные: ${JSON.stringify(requestData)}`);
    tg.sendData(JSON.stringify(requestData));
    alert("✅ Ваш заказ отправлен в бота!");
    closeModal();
    toggleSection("my-orders");
  }

  function fetchOrders() {
    tg.sendData(JSON.stringify({ command: "get_user_orders", user_id: userId }));
    log("🟩 Запрошены мои заказы");
  }

  function updateMyOrders(orders) {
    const container = document.getElementById("user-orders-container");
    container.innerHTML = "";
    orders.forEach(order => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>#${order.id}</td><td>${order.status}</td>`;
      container.appendChild(tr);
    });
    log(`🟦 "Мои заказы" обновлены`);
  }

  function calculate() {
    const country = document.getElementById("calc-country").value;
    const marketplace = document.getElementById("calc-marketplace").value;
    const priceInput = document.getElementById("price").value.trim();

    if (!country || !priceInput) {
      alert("Выберите страну и введите цену.");
      return;
    }

    const price = parseFloat(priceInput);
    let result = 0;

    switch(country) {
      case "china":
        result = marketplace === "poizon_taobao_weidan"
          ? price * 14.5 * 1.08
          : price * 14.5 * 1.13;
        break;
      case "japan":
        result = price * 0.72 * 1.03;
        break;
    }

    document.getElementById("result").innerText = `Итоговая стоимость: ${result.toFixed(2)} ₽`;
    log(`🟩 Рассчитана стоимость: ${result.toFixed(2)} ₽`);
  }

  function updateCalculatorFields() {
    const calcCountry = document.getElementById("calc-country").value;
    document.getElementById("calc-marketplace-section").style.display = calcCountry === "china" ? "block" : "none";
  }

  // --- Инициализация Telegram WebApp ---
  tg.ready();

  // --- Обработчик данных от бота ---
  window.Telegram.WebApp.onEvent("web_app_data_sent", function(event) {
    try {
      const data = JSON.parse(event.data);
      if (data.command === "return_orders") {
        showOrdersFromBot(data.orders);
      } else if (data.command === "all_orders") {
        renderManagerOrders(data.orders);
      } else if (data.command === "order_updated") {
        alert(`🔄 Статус изменён: ${data.status}`);
      }
    } catch (e) {
      log(`🟥 Ошибка разбора данных: ${e.message}`);
    }
  });

  function showOrdersFromBot(data) {
    updateMyOrders(data.orders);
    log("🟦 Заказы загружены из бота");
  }

  function renderManagerOrders(orders) {
    const container = document.getElementById("manager-orders-container");
    container.innerHTML = "";
    orders.forEach(order => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>#${order.id}</td><td>${order.status}</td><td>Управление недоступно</td>`;
      container.appendChild(tr);
    });
    log("🟦 Все заказы от бота");
  }

  function changeStatus(orderId, newStatus) {
    tg.sendData(JSON.stringify({
      command: "update_order_status",
      order_id: orderId,
      status: newStatus
    }));
    log(`🟦 Изменён статус заказа #${orderId} на "${newStatus}"`);
  }

  function navigateTo(sectionId) {
    toggleSection(sectionId);
  }

  function toggleSection(sectionId) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove("active"));
    const section = document.getElementById(sectionId);
    if (section) section.classList.add("active");
    log(`🟩 Переход к секции "${sectionId}"`);
  }

  function fetchAllOrders() {
    tg.sendData(JSON.stringify({ command: "get_all_orders" }));
    log("🟩 Запрошены все заказы");
  }

  function updateMyOrders(orders) {
    const container = document.getElementById("user-orders-container");
    container.innerHTML = "";
    orders.forEach(order => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>#${order.id}</td><td>${order.status}</td>`;
      container.appendChild(tr);
    });
    log(`🟦 "Мои заказы" обновлены`);
  }

  function showAllOrdersFromBot(data) {
    const container = document.getElementById("manager-orders-container");
    container.innerHTML = "";
    data.orders.forEach(order => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>#${order.id}</td><td>${order.status}</td><td>Управление недоступно</td>`;
      container.appendChild(tr);
    });
    log("🟦 Все заказы от бота");
  }

  function fetchOrders() {
    tg.sendData(JSON.stringify({ command: "get_user_orders", user_id: userId }));
    log("🟩 Запрошены мои заказы");
  }

  function fetchAllOrders() {
    tg.sendData(JSON.stringify({ command: "get_all_orders" }));
    log("🟩 Запрошены все заказы");
  }
</script>
</body>
</html>
