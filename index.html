<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volt Logistics</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script> 

  <style>
    :root {
      --text-white: rgba(255, 255, 255, 1);
      --text-gray-medium: rgba(161, 161, 161, 1);
      --bg-dark: #141414;
      --card-bg: rgba(98, 98, 98, 0.34);
      --accent-blue: #00DBFF;
      --shadow-sm: 0px 3px 8px rgba(0, 0, 0, 0.5), 0px 14px 14px rgba(0, 0, 0, 0.5);
      --shadow-md: 0px 31px 19px rgba(0, 0, 0, 0.5), 0px 56px 22px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0px 87px 24px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background-color: var(--bg-dark);
      font-family: 'TT Runs Trial', sans-serif;
      color: white;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .container {
      padding: 24px;
    }

    /* Широкая кнопка "Акции" */
    .wide-block {
      background-color: rgba(46, 46, 46, 1);
      border-radius: 23px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .wide-block:active {
      transform: scale(0.98);
      filter: brightness(0.9);
    }

    .wide-block img {
      width: 100%;
      height: auto;
    }

    .wide-block p {
      font-size: 24px;
      color: var(--text-white);
      font-weight: bold;
    }

    /* Блоки по 2 в строке */
    .grid-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .block {
      width: calc(50% - 10px);
      background-color: rgba(98, 98, 98, 0.34);
      backdrop-filter: blur(31.1px);
      border-radius: 23px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .block img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    .block p {
      font-size: 20px;
      color: var(--text-white);
      font-weight: normal;
    }

    /* Нижнее меню */
    .bottom-menu {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }

    .profile-button, .telegram-button, .order-button {
      width: 61px;
      height: 61px;
      background-color: rgba(98, 98, 98, 0.34);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .profile-button img, .telegram-button img, .order-button img {
      width: 40px;
      height: 40px;
    }

    /* Стили для других страниц */
    .button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #000;
      color: white;
      border-radius: 23px;
      text-decoration: none;
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 11px;
      background-color: rgba(0, 139, 162, 1);
      color: white;
      margin-bottom: 15px;
      font-size: 16px;
    }

    select {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 11px;
      background-color: rgba(0, 139, 162, 1);
      color: white;
      margin-bottom: 15px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const routes = {
      '/': HomePage,
      '/promotions': PromotionsPage,
      '/order': OrderPage,
      '/order/details': OrderDetailsPage,
      '/profile': ProfilePage,
      '/profile/orders': MyOrdersPage,
      '/telegram': TelegramPage
    };

    function navigate(path) {
      const page = routes[path] || NotFound;
      document.getElementById('app').innerHTML = page();
    }

    window.addEventListener('hashchange', () => {
      navigate(window.location.hash.slice(1));
    });

    window.addEventListener('load', () => {
      navigate('/');
    });

    const WebApp = window.Telegram.WebApp;
    WebApp.ready();

    async function sendDataToSheet(data) {
      const url = "https://script.google.com/macros/s/AKtNXYZ/exec";  // замени на свою GAS-ссылку
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) alert("Заказ успешно отправлен!");
        else alert("Ошибка при отправке");
      } catch (e) {
        console.error(e);
        alert("Не удалось отправить данные");
      }
    }

    function HomePage() {
      return `
        <div class="container">

          <!-- Широкая кнопка "Акции" -->
          <div class="wide-block" onclick="navigate('/promotions')">
            <img src="https://m37avolt.github.io/volt-logistics/img/discount-1-28.png"  alt="Акции" />
            <p>акции</p>
          </div>

          <!-- Блоки по 2 в строке -->
          <div class="grid-row">
            <div class="block" onclick="navigate('/order/details')">
              <img src="https://m37avolt.github.io/volt-logistics/img/image-2-13.png"  alt="Актуальный курс" />
              <p>актуальный курс</p>
            </div>
            <div class="block" onclick="navigate('/order')">
              <img src="https://m37avolt.github.io/volt-logistics/img/shopping-cart-1-18.png"  alt="Оформить заказ" />
              <p>оформить заказ</p>
            </div>
          </div>

          <div class="grid-row">
            <div class="block" onclick="navigate('/order')">
              <img src="https://m37avolt.github.io/volt-logistics/img/calculator-1-23.png"  alt="Рассчитать заказ" />
              <p>рассчитать<br>заказ</p>
            </div>
            <div class="block" onclick="window.open('https://t.me/VOLTZAKAZ',  '_blank')">
              <img src="https://m37avolt.github.io/volt-logistics/img/price-tag-1-27.png"  alt="Telegram" />
              <p>Telegram канал</p>
            </div>
          </div>

          <div class="grid-row">
            <div class="block" onclick="navigate('/profile')">
              <img src="https://m37avolt.github.io/volt-logistics/img/user-guide-1-8.png"  alt="Наши отзывы" />
              <p>наши отзывы</p>
            </div>
            <div class="block">
              <p style="color: rgba(115, 115, 115, 1); font-size: 11px;">агентский договор</p>
            </div>
          </div>

          <!-- Нижнее меню -->
          <div class="bottom-menu">
            <div class="profile-button" onclick="navigate('/profile')">
              <img src="https://m37avolt.github.io/volt-logistics/img/v28_56.png"  alt="Профиль" />
            </div>
            <div class="telegram-button" onclick="window.open('https://t.me/VOLTZAKAZ',  '_blank')">
              <img src="https://m37avolt.github.io/volt-logistics/img/v55_5.png"  alt="Telegram" />
            </div>
            <div class="order-button" onclick="navigate('/order')">
              <img src="https://m37avolt.github.io/volt-logistics/img/v28_57.png"  alt="Оформить заказ" />
            </div>
          </div>

        </div>
      `;
    }

    function PromotionsPage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-4.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <div style="background-color: rgba(66, 66, 66, 1); border-radius: 19px; padding: 16px; margin-bottom: 20px;">
            <p style="color: var(--text-gray-medium);">актуальные акции</p>
            <p class="text-white">Volt Logistics</p>
          </div>

          <div style="background-color: #0f0f0f; border-radius:14px; padding: 16px;">
            <p>Пример акции</p>
          </div>

          <img src="https://m37avolt.github.io/volt-logistics/img/discount-2-13.png"  alt="discount" />
        </div>
      `;
    }

    function OrderPage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-4.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <div style="background-color: rgba(66, 66, 66, 1); border-radius: 19px; padding: 16px; margin-top: 20px;">
            <p style="color: rgba(161, 161, 161, 1);">оформить заказ</p>
            <p class="text-white">Volt Logistics</p>
            <img src="https://m37avolt.github.io/volt-logistics/img/telegram-1-9.png"  alt="Telegram" />
          </div>

          <p class="text-white">Выберите страну выкупа</p>
          <div style="background-color: rgba(0, 219, 255, 0.35); border-radius: 11px; padding: 16px; margin-top: 10px; text-align:center; font-size:18px;">Китай</div>

          <p><a href="#/order/details" class="button">Подробнее</a></p>
        </div>
      `;
    }

    function OrderDetailsPage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-70.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <form id="orderForm">
            <p class="text-white">Вставьте ссылку</p>
            <input type="url" id="link" required placeholder="https://example.com"  />

            <p class="text-white">Введите цену</p>
            <input type="number" id="price" required placeholder="1500" />

            <p class="text-white">Введите цвет</p>
            <input type="text" id="color" required placeholder="Черный" />

            <p class="text-white">Введите размер</p>
            <input type="text" id="size" required placeholder="42" />

            <p class="text-white">Введите количество</p>
            <input type="number" id="quantity" required placeholder="1" />

            <p class="text-white">Введите комментарий</p>
            <input type="text" id="comment" placeholder="Без комментариев" />

            <p class="text-white">Введите Ваше ФИО</p>
            <input type="text" id="name" required placeholder="Иванов Иван Иванович" />

            <p class="text-white">Введите Ваш юзернейм</p>
            <input type="text" id="username" required placeholder="@ivanov" />

            <p class="text-white">Введите Ваш ПВЗ СДЭК</p>
            <input type="text" id="pvz" required placeholder="г. Москва, ул. Ленина, д. 1" />

            <p><button type="submit" class="button">Создать заказ</button></p>
          </form>
        </div>

        <script>
          document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
              link: document.getElementById('link').value,
              price: document.getElementById('price').value,
              color: document.getElementById('color').value,
              size: document.getElementById('size').value,
              quantity: document.getElementById('quantity').value,
              comment: document.getElementById('comment').value,
              name: document.getElementById('name').value,
              username: document.getElementById('username').value,
              pvz: document.getElementById('pvz').value,
            };

            if (!data.link || !data.price || !data.name || !data.username || !data.pvz) {
              alert("Пожалуйста, заполните обязательные поля.");
              return;
            }

            sendDataToSheet(data);
          });
        <\/script>
      `;
    }

    function ProfilePage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-30.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <div style="background-color: var(--card-bg); border-radius: 23px; padding: 16px; margin-bottom: 20px; text-align:center;">
            <img src="https://m37avolt.github.io/volt-logistics/img/image-5-9.png"  alt="avatar" style="width: 100px; height: 100px; border-radius: 20px; margin-bottom: 10px;" />
            <p class="text-white" style="font-size: 20px;">мой профиль</p>
          </div>

          <a href="#/profile/orders" class="card">
            <p class="text-white">мои заказы</p>
          </a>

          <div class="card">
            <p class="text-white">панель менеджера</p>
          </div>

          <div class="card">
            <p class="text-white">реферальная программа</p>
          </div>
        </div>
      `;
    }

    function MyOrdersPage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-24.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <div class="card">
            <p class="text-white">ник телеграм</p>
          </div>

          <div class="card">
            <p class="text-white">активные заказы</p>
            <p style="color: #00dbff; font-size: 150px; margin: 10px 0;">1</p>
          </div>

          <div class="card">
            <p class="text-white">завершенные заказы</p>
            <p style="color: #00dbff; font-size: 150px; margin: 10px 0;">10</p>
          </div>
        </div>
      `;
    }

    function TelegramPage() {
      return `
        <div class="container">
          <a href="#" class="back-link">
            <img src="https://m37avolt.github.io/volt-logistics/img/arrow-1-4.svg"  alt="arrow" />
            <span>назад</span>
          </a>

          <div style="background-color: #272727; border-radius: 18px; padding: 16px;">
            <img src="https://m37avolt.github.io/volt-logistics/img/image-4-8.png"  alt="Telegram Logo" style="border-radius: 18px; width: 100%; margin-bottom: 16px;" />
            <p style="font-size: 24px; color: white;">VOLT LOGISTICS</p>
            <a href="https://t.me/voltlogistics"  target="_blank" class="button" style="display: inline-block; background-color: #00dbff; color: black; text-align: center;">подписаться</a>
          </div>

          <div style="margin-top: 30px;">
            <p style="color: rgba(161, 161, 161, 1);">наш телеграм канал</p>
            <p class="text-white">Volt Logistics</p>
            <img src="https://m37avolt.github.io/volt-logistics/img/telegram-1-16.png"  alt="Telegram icon" style="width: 100%; margin-top: 10px;" />
          </div>
        </div>
      `;
    }

    function NotFound() {
      return `<div class="container"><p>Страница не найдена</p></div>`;
    }
  </script>
</body>
</html>
