<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VOLT Logistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- SheetJS для чтения Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #007bb5;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        label {
            margin-right: 10px;
            text-align: left;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        img.preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .excel-table th, .excel-table td {
            padding: 8px;
            border: 1px solid #999;
        }

        .marketplace-select {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOLT Logistics</h1>
        <button class="button" onclick="toggleSection('calculator')">🧮 Калькулятор</button>
        <button class="button" onclick="toggleSection('create-order')">📝 Создать новый заказ</button>
        <button class="button" onclick="toggleSection('my-orders')">📦 Мои заказы</button>
        <button class="button" id="manager-button" style="display: none;" onclick="toggleSection('manager')">🔒 Панель менеджера</button>

        <!-- Секция: Создать заказ -->
        <div id="create-order" class="section">
            <h2>Создать новый заказ</h2>
            <label for="country">Страна выкупа:</label>
            <select id="country" class="form-control" onchange="handleCountryChange()">
                <option value="" selected disabled>Выберите страну</option>
                <option value="china">🇨🇳 Китай</option>
                <option value="japan">🇯🇵 Япония</option>
                <option value="europe" disabled style="color: gray;">🇪🇺 Европа (временно недоступна)</option>
                <option value="usa" disabled style="color: gray;">🇺🇸 США (временно недоступны)</option>
            </select>

            <div id="marketplace-section" class="marketplace-select">
                <br>
                <label for="marketplace">Маркетплейс:</label>
                <select id="marketplace" class="form-control">
                    <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN И ДР.</option>
                    <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
                </select>
            </div>

            <div id="order-form" style="display: none; margin-top: 20px;">
                <h3>Добавьте товар(ы)</h3>
                <div id="items-container"></div>
                <button type="button" class="button" onclick="addItem()">➕ Добавить товар</button><br><br>

                <label for="full-name">ФИО:</label>
                <input type="text" id="full-name" required class="form-control"><br><br>

                <label for="telegram-username">Telegram username:</label>
                <input type="text" id="telegram-username" required class="form-control"><br><br>

                <button class="button" onclick="submitOrder()">✅ Создать заказ</button>
            </div>
        </div>

        <!-- Секция: Мои заказы -->
        <div id="my-orders" class="section">
            <h2>📦 Мои заказы</h2>
            <button class="button" onclick="loadOrdersFromGitHub()">🔄 Загрузить мои заказы</button>
            <div id="excel-table-container" style="margin-top: 20px;"></div>
        </div>

        <!-- Секция: Калькулятор -->
        <div id="calculator" class="section">
            <h2>🧮 Калькулятор стоимости</h2>
            <label for="calc-country">Страна выкупа:</label>
            <select id="calc-country" class="form-control" onchange="updateCalculatorFields()">
                <option value="" selected disabled>Выберите страну</option>
                <option value="china">Китай 🇨🇳</option>
                <option value="japan">Япония 🗼</option>
                <option value="europe" disabled style="color: gray;">Европа 🇪🇺</option>
                <option value="usa" disabled style="color: gray;">США 🇺🇸</option>
            </select>

            <div id="calc-marketplace-section" style="display: none;">
                <br>
                <label for="calc-marketplace">Маркетплейс:</label>
                <select id="calc-marketplace" class="form-control">
                    <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN И ДР.</option>
                    <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
                </select>
            </div>

            <br>
            <label for="price">Цена (за единицу):</label>
            <input type="number" id="price" step="any" placeholder="Введите цену" required class="form-control">
            <br>
            <button class="button" onclick="calculate()">Рассчитать</button>
            <div id="result" class="result"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;

        function toggleSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove("active"));
            document.getElementById(sectionId).classList.add("active");
        }

        function handleCountryChange() {
            const countrySelect = document.getElementById("country");
            const marketplaceSection = document.getElementById("marketplace-section");
            const orderForm = document.getElementById("order-form");

            // Очищаем предыдущие товары
            const itemsContainer = document.getElementById("items-container");
            itemsContainer.innerHTML = "";

            if (countrySelect.value === "china") {
                marketplaceSection.style.display = "block";
                addItem();
            } else if (countrySelect.value === "japan") {
                marketplaceSection.style.display = "none";
                addJapanItem();
            } else {
                alert("Пока доступны только Китай и Япония.");
            }

            orderForm.style.display = "block";
        }

        function addItem() {
            const itemsContainer = document.getElementById("items-container");
            const rowCount = itemsContainer.childElementCount + 1;

            const newItem = document.createElement("div");
            newItem.className = "item-row";
            newItem.innerHTML = `
                <div style="margin-top: 10px;">
                    <hr>
                    <h4>Товар #${rowCount}</h4>
                    <!-- Фото товара -->
                    <label>Загрузите фото:</label>
                    <input type="file" class="form-control-file item-photo" accept="image/*" multiple onchange="previewPhotos(this)">
                    <div class="photo-preview" style="display:flex;flex-wrap:wrap;gap:10px;"></div>

                    <!-- Маркетплейс -->
                    <label for="item-marketplace-${rowCount}">Маркетплейс:</label>
                    <select id="item-marketplace-${rowCount}" class="form-control" onchange="updateMarketplace(${rowCount})">
                        <option value="poizon_taobao_weidan">POIZON / TAOBAO / WEIDAN И ДР.</option>
                        <option value="weechat_yupoo_goofish">WEECHAT / YUPOO / GOOFISH</option>
                    </select>

                    <!-- Ссылка или WeeChat ID -->
                    <div id="item-link-container-${rowCount}">
                        <label for="item-link-${rowCount}">Ссылка на товар:</label>
                        <input type="text" id="item-link-${rowCount}" class="form-control" placeholder="https://taobao.com/item123">
                    </div>
                    <div id="item-weechat-info-${rowCount}" style="display: none;">
                        <label for="item-weechat-id-${rowCount}">WeeChat ID / QR-код:</label>
                        <input type="text" id="item-weechat-id-${rowCount}" class="form-control" placeholder="Пример: 123456789">
                        <input type="file" id="item-qr-code-${rowCount}" accept="image/*" class="form-control-file" placeholder="QR-код">
                    </div>

                    <!-- Цена -->
                    <label for="item-price-${rowCount}">Цена за единицу без учета скидок:</label>
                    <input type="number" id="item-price-${rowCount}" class="form-control" step="any" placeholder="¥ 800">

                    <!-- Цвет -->
                    <label for="item-color-${rowCount}">Цвет:</label>
                    <input type="text" id="item-color-${rowCount}" class="form-control" placeholder="Чёрный / Black">

                    <!-- Размер -->
                    <label for="item-size-${rowCount}">Размер:</label>
                    <input type="text" id="item-size-${rowCount}" class="form-control" placeholder="Пример: M / 42 / EU40">

                    <!-- Количество -->
                    <label for="item-quantity-${rowCount}">Количество:</label>
                    <input type="number" id="item-quantity-${rowCount}" min="1" class="form-control" value="1">

                    <!-- Комментарий к товару -->
                    <label for="item-comment-${rowCount}">Комментарий:</label>
                    <input type="text" id="item-comment-${rowCount}" class="form-control" placeholder="Батч A1 | Упаковать аккуратно...">

                    <!-- Удаление товара -->
                    <button type="button" class="button" onclick="removeItem(this)" style="margin-top: 10px;">🗑 Удалить товар</button>
                </div>
            `;
            itemsContainer.appendChild(newItem);

            // По умолчанию показываем "Ссылка", если не WEECHAT
            newItem.querySelector(`#item-marketplace-${rowCount}`).addEventListener("change", () => {
                updateMarketplace(rowCount);
            });
            updateMarketplace(rowCount);
        }

        function addJapanItem() {
            const itemsContainer = document.getElementById("items-container");
            const rowCount = itemsContainer.childElementCount + 1;

            const newItem = document.createElement("div");
            newItem.className = "item-row";
            newItem.innerHTML = `
                <div style="margin-top: 10px;">
                    <hr>
                    <h4>Товар #${rowCount}</h4>

                    <!-- Фото товара -->
                    <label>Загрузите фото:</label>
                    <input type="file" class="form-control-file item-photo" accept="image/*" multiple onchange="previewPhotos(this)">
                    <div class="photo-preview" style="display:flex;flex-wrap:wrap;gap:10px;"></div>

                    <!-- Ссылка на товар -->
                    <label for="item-link-${rowCount}">Ссылка на товар:</label>
                    <input type="text" id="item-link-${rowCount}" class="form-control" placeholder="https://yame.co.jp/item123">

                    <!-- Цена -->
                    <label for="item-price-${rowCount}">Цена за единицу (JPY):</label>
                    <input type="number" id="item-price-${rowCount}" class="form-control" step="any" placeholder="¥ 2000">

                    <!-- Цвет -->
                    <label for="item-color-${rowCount}">Цвет:</label>
                    <input type="text" id="item-color-${rowCount}" class="form-control" placeholder="Черный / Noir">

                    <!-- Размер -->
                    <label for="item-size-${rowCount}">Размер:</label>
                    <input type="text" id="item-size-${rowCount}" class="form-control" placeholder="M / 42 / EU40">

                    <!-- Количество -->
                    <label for="item-quantity-${rowCount}">Количество:</label>
                    <input type="number" id="item-quantity-${rowCount}" min="1" class="form-control" value="1">

                    <!-- Комментарий -->
                    <label for="item-comment-${rowCount}">Комментарий:</label>
                    <input type="text" id="item-comment-${rowCount}" class="form-control" placeholder="Батч A1 | Примечание">

                    <!-- Удаление товара -->
                    <button type="button" class="button" onclick="removeItem(this)">🗑 Удалить товар</button>
                </div>
            `;
            itemsContainer.appendChild(newItem);
        }

        function updateMarketplace(index) {
            const marketplaceInput = document.getElementById(`item-marketplace-${index}`);
            const linkContainer = document.getElementById(`item-link-container-${index}`);
            const weechatInfoContainer = document.getElementById(`item-weechat-info-${index}`);

            if (marketplaceInput && marketplaceInput.value === "weechat_yupoo_goofish") {
                linkContainer.style.display = "none";
                weechatInfoContainer.style.display = "block";
            } else {
                linkContainer.style.display = "block";
                weechatInfoContainer.style.display = "none";
            }
        }

        function removeItem(button) {
            const itemRow = button.parentElement;
            itemRow.remove();
        }

        function previewPhotos(input) {
            const preview = input.nextElementSibling;
            preview.innerHTML = "";
            const files = Array.from(input.files).slice(0, 5); // до 5 файлов

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.style.width = "50px";
                    img.style.height = "50px";
                    img.style.objectFit = "cover";
                    img.style.borderRadius = "5px";
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function calculate() {
            const country = document.getElementById("calc-country").value;
            const marketplace = document.getElementById("calc-marketplace").value;
            const priceInput = document.getElementById("price").value.trim();

            if (!country || !priceInput) {
                alert("Выберите страну и введите цену.");
                return;
            }

            const price = parseFloat(priceInput);
            let result = 0;

            switch(country) {
                case "china":
                    if (marketplace === "poizon_taobao_weidan") {
                        result = price * currency_rates["CNY"] * 1.08;
                    } else {
                        result = price * currency_rates["CNY"] * 1.13;
                    }
                    break;
                case "japan":
                    result = price * currency_rates["JPY"] * 1.03;
                    break;
                default:
                    alert("Ошибка: выберите корректную страну.");
                    return;
            }

            document.getElementById("result").innerText = `Итоговая стоимость: ${result.toFixed(2)} ₽`;
        }

        function submitOrder() {
            const full_name = document.getElementById("full-name").value.trim();
            const telegram_username = document.getElementById("telegram-username").value.trim();
            const country = document.getElementById("country").value;
            const itemsContainer = document.getElementById("items-container");

            if (!full_name || !telegram_username || !country || itemsContainer.childElementCount === 0) {
                alert("⚠️ Заполните все поля перед созданием заказа.");
                return;
            }

            const items = Array.from(itemsContainer.children).map((itemRow, idx) => {
                const photoInput = itemRow.querySelector(".item-photo");
                const linkOrIdInput = itemRow.querySelector(`#item-link-${idx + 1}`) ||
                                     itemRow.querySelector(`#item-weechat-id-${idx + 1}`);
                const priceInput = itemRow.querySelector(`#item-price-${idx + 1}`);
                const colorInput = itemRow.querySelector(`#item-color-${idx + 1}`);
                const sizeInput = itemRow.querySelector(`#item-size-${idx + 1}`);
                const quantityInput = itemRow.querySelector(`#item-quantity-${idx + 1}`);
                const commentInput = itemRow.querySelector(`#item-comment-${idx + 1}`);

                return {
                    photos: [...Array.from(photoInput?.files || [])].map(f => f.name),
                    link_or_id: linkOrIdInput?.value || "",
                    price: parseFloat(priceInput?.value || 0),
                    color: colorInput?.value || "",
                    size: sizeInput?.value || "",
                    quantity: parseInt(quantityInput?.value || 1),
                    comment: commentInput?.value || ""
                };
            });

            const requestData = {
                command: "create_order",
                full_name: full_name,
                telegram_username: telegram_username,
                country: country,
                items: items
            };

            console.log("Отправляемые данные:", JSON.stringify(requestData, null, 2));
            tg.sendData(JSON.stringify(requestData));
            alert("✅ Ваш заказ успешно отправлен!");
            toggleSection("calculator");
        }

        // --- Загрузка Excel с GitHub ---
        async function loadOrdersFromGitHub() {
            const today = new Date().toISOString().split("T")[0]; // текущая дата YYYY-MM-DD
            const excelUrl = `https://raw.githubusercontent.com/m37avolt/volt-logistics/main/orders/${today}.xlsx`;

            try {
                const response = await fetch(excelUrl);
                if (!response.ok) throw new Error("Файл не найден на GitHub.");

                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];

                const json = XLSX.utils.sheet_to_json(worksheet);

                showExcelTable(json);
            } catch (error) {
                alert("Не удалось загрузить Excel с GitHub: " + error.message);
                console.error(error);
            }
        }

        function showExcelTable(data) {
            const container = document.getElementById("excel-table-container");
            container.innerHTML = "<h3>Ваши заказы (из Excel)</h3>";

            if (!data.length) {
                container.innerHTML += "<p>Нет данных</p>";
                return;
            }

            const table = document.createElement("table");
            const thead = document.createElement("thead");
            const tbody = document.createElement("tbody");

            // Заголовки таблицы
            const headerRow = document.createElement("tr");
            Object.keys(data[0]).forEach(key => {
                const th = document.createElement("th");
                th.innerText = key;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Тело таблицы
            data.forEach(row => {
                const tr = document.createElement("tr");
                Object.values(row).forEach(value => {
                    const td = document.createElement("td");
                    td.innerText = value;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            table.className = "excel-table";

            container.innerHTML = ""; // очищаем
            container.appendChild(table);
        }

        // --- Обработка ответов от бота ---
        tg.onEvent("web_app_data", function(data) {
            try {
                const response = JSON.parse(data.data);

                if (response.command === "create_order") {
                    alert(`✅ Заказ #${response.order_id} создан.`);
                    toggleSection("calculator");
                } else if (response.command === "track_order") {
                    document.getElementById("order-status").innerText = `Статус: ${response.status}`;
                } else if (response.command === "edit_order_status") {
                    alert(`Статус изменён на: ${response.status}`);
                    toggleSection("manager");
                } else if (response.command === "add_comment") {
                    alert(`Комментарий к заказу #${response.order_id} добавлен.`);
                } else if (response.command === "attach_photo") {
                    alert(`Фотография к заказу #${response.order_id} прикреплена.`);
                } else if (response.command === "send_requisites") {
                    alert(`Реквизиты к заказу #${response.order_id} отправлены.`);
                }
            } catch (e) {
                console.error("Ошибка обработки данных от бота.", e);
            }
        });

        tg.ready();
    </script>
</body>
</html>
