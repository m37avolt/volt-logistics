<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main - Volt Logistics</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Фиксированная полоска с Telegram вверху экрана -->
    <div class="telegram-fixed-bar">
        <div class="telegram-bar-content">
            <img src="img/main_tg.svg" alt="Volt Logistics Telegram" class="main-tg-image-fixed"
                onerror="handleImageError(this, 'Telegram')" onload="handleImageLoad(this)">
            <div class="image-fallback main-tg-fallback" style="display: none;">
                <div
                    style="display: flex; align-items: center; gap: 12px; padding: 16px; background-color: #2e2e2e; border-radius: 20px;">
                    <div
                        style="width: 40px; height: 40px; background-color: #00BCD4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;">
                        ✈</div>
                    <div>
                        <div style="color: white; font-weight: 600;">Volt Logistics</div>
                        <div style="color: #737373; font-size: 13px;">наш телеграм канал</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-page-container" style="padding-top: 80px;">
        <!-- Центральная секция с основным блоком и интегрированной кнопкой -->
        <div class="main-center-section">
            <div class="main-content-block" style="position: relative;">
                <img src="img/main.svg" alt="Volt Logistics Main Block" class="main-block-image"
                    onerror="handleImageError(this, 'Main Block')" onload="handleImageLoad(this)">

                <!-- Кнопка поверх основного блока -->
                <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
                    <img src="img/main_button.svg" alt="Подписаться" class="main-button-image"
                        onclick="openTelegramChannel()" onerror="handleImageError(this, 'Button')"
                        onload="handleImageLoad(this)" style="cursor: pointer; width: 250px; height: auto;">
                    <div class="image-fallback main-button-fallback" style="display: none;">
                        <button
                            style="background-color: #00BCD4; color: #000000; border: none; border-radius: 20px; padding: 12px 40px; font-size: 14px; font-weight: 600; cursor: pointer; text-transform: uppercase; min-width: 200px;"
                            onclick="openTelegramChannel()">ПОДПИСАТЬСЯ</button>
                    </div>
                </div>

                <div class="image-fallback main-block-fallback" style="display: none;">
                    <div
                        style="background-color: #2e2e2e; border-radius: 25px; padding: 40px 20px; text-align: center; position: relative;">
                        <div
                            style="width: 80px; height: 80px; background-color: #000; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: #00BCD4; font-size: 36px; font-weight: bold;">
                            V</div>
                        <div
                            style="color: white; font-size: 18px; font-weight: 600; letter-spacing: 1px; margin-bottom: 20px;">
                            VOLT LOGISTICS</div>
                        <button
                            style="background-color: #00BCD4; color: #000000; border: none; border-radius: 20px; padding: 12px 40px; font-size: 14px; font-weight: 600; cursor: pointer; text-transform: uppercase; min-width: 200px;"
                            onclick="openTelegramChannel()">ПОДПИСАТЬСЯ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Фиксированное меню -->
    <div class="fixed-nav" id="mainNav">
        <img src="img/profile.svg" alt="Профиль" class="nav-button loading" onclick="navigateTo('profile')"
            onerror="handleImageError(this, 'Профиль')" onload="handleImageLoad(this)">
        <img src="img/chat.svg" alt="Чат" class="nav-button loading" onclick="openTelegramManager()"
            onerror="handleImageError(this, 'Чат')" onload="handleImageLoad(this)">
        <img src="img/order.svg" alt="Заказ" class="nav-button loading" onclick="navigateTo('order')"
            onerror="handleImageError(this, 'Заказ')" onload="handleImageLoad(this)">
    </div>

    <!-- Кнопка "Назад" с SVG -->
    <button class="stylish-back-button" aria-label="Назад"></button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>

</html>
