<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Актуальный курс - Volt Logistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-header">
        <div class="page-title">Актуальный курс</div>
    </div>
    <div class="page-content">
        <div class="placeholder-content">
            <h3>Курсы валют</h3>
            <p>Здесь будут актуальные курсы валют</p>
        </div>
    </div>

    <!-- Фиксированное меню -->
    <div class="fixed-nav" id="mainNav">
        <img src="img/profile.svg" alt="Профиль" class="nav-button loading" onclick="navigateTo('profile')"
            onerror="handleImageError(this, 'Профиль')" onload="handleImageLoad(this)">
        <img src="img/chat.svg" alt="Чат" class="nav-button loading" onclick="openTelegramManager()"
            onerror="handleImageError(this, 'Чат')" onload="handleImageLoad(this)">
        <img src="img/order.svg" alt="Заказ" class="nav-button loading" onclick="navigateTo('order')"
            onerror="handleImageError(this, 'Заказ')" onload="handleImageLoad(this)">
    </div>

    <!-- Кнопка "Назад" с SVG -->
    <button class="stylish-back-button" aria-label="Назад"></button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
